services:
  containo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: containo-app
    ports:
      - "3611:3611"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host:ro
      - ./data:/app/data
    privileged: true
    environment:
      - NODE_ENV=production
      - DOCKER_HOST=unix:///var/run/docker.sock
      - NODE_OPTIONS=--max-old-space-size=128
    user: root
    restart: unless-stopped

networks:
  default:
    name: containo-network
